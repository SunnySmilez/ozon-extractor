name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --name ozon_extractor --console --collect-all bs4 --collect-all requests ozon_extractor.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ozon_extractor_windows
          path: dist/ozon_extractor.exe
